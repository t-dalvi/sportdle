<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sportdle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Stadium palette */
      --night:       #060c14;   /* deep night sky behind the upper deck */
      --stands:      #0b1520;   /* dark blue of empty seats in shadow */
      --turf-edge:   #0d1f0f;   /* deep turf green at the boundary */
      --field:       #132a15;   /* lit field green */
      --concrete:    #111c2a;   /* concourse / card surface */
      --concrete-hi: #172334;   /* slightly lifted surface */
      --stripe:      #0f2540;   /* faint yard-line stripe */
      --floodlight:  #e8f0ff;   /* harsh white floodlight */
      --floodlight2: #b0c4e8;   /* secondary floodlight, slightly cooled */
      --gold:        #f0b429;   /* NFL trophy gold */
      --gold-dim:    #7a5a10;   /* muted gold for borders */
      --turf-green:  #2ecc6a;   /* bright turf accent */
      --turf-dim:    #174d2b;   /* dim turf for borders */
      --red-zone:    #c0392b;   /* end zone red */
      --muted:       #4a6080;   /* muted text */
      --radius: 6px;
      /* distance tier colors — vivid on dark bg */
      --yellow: #f0c040;   --yellow-bg: #2a1f00;  --yellow-border: #7a5a10;
      --orange: #f07030;   --orange-bg: #2a1000;  --orange-border: #7a3010;
      --red:    #e04040;   --red-bg:    #2a0808;  --red-border:    #7a1818;
      --brown:  #c08050;   --brown-bg:  #1e1008;  --brown-border:  #6a4020;
      --black-fg: #8090a0; --black-bg:  #0d1520;  --black-border:  #2a3a4a;
      --success:        #2ecc6a;
      --success-bg:     #0a2018;
      --success-border: #174d2b;
      --success-text:   #2ecc6a;
    }

    body {
      background-color: var(--night);
      background-image:
        radial-gradient(ellipse 120% 40% at 50% 0%, #1a3a6a 0%, transparent 60%),
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 55px,
          rgba(255,255,255,0.015) 55px,
          rgba(255,255,255,0.015) 56px
        );
      color: var(--floodlight);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem 5rem;
    }

    #app { width: 100%; max-width: 580px; }

    /* ── FIELD STRIPE top decoration ── */
    #app::before {
      content: '';
      display: block;
      height: 3px;
      background: repeating-linear-gradient(
        90deg,
        var(--turf-green) 0px, var(--turf-green) 30px,
        transparent 30px, transparent 36px
      );
      margin-bottom: 1.5rem;
      opacity: 0.6;
    }

    /* ── HEADER ── */
    .header { text-align: center; margin-bottom: 1.75rem; }
    .header-icon { font-size: 2.2rem; margin-bottom: 6px; }
    .header h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 42px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--floodlight);
      line-height: 1;
    }
    .header h1 span { color: var(--gold); }
    .header p {
      font-size: 13px;
      color: var(--muted);
      margin-top: 6px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* ── SCOREBAR ── */
    .scorebar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 1.5rem;
      padding: 10px 16px;
      background: var(--concrete);
      border: 1px solid var(--stripe);
      border-radius: var(--radius);
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }
    .score-stat { text-align: center; }
    .score-stat span {
      display: block;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 1px;
      line-height: 1.1;
    }

    /* ── CLUE CARDS ── */
    .clues { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1.25rem; }
    .clue-card {
      background: var(--concrete);
      border: 1px solid var(--stripe);
      border-left: 3px solid var(--turf-dim);
      border-radius: var(--radius);
      padding: 0.9rem 1.1rem;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .clue-num {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--turf-green);
      letter-spacing: 1px;
      text-transform: uppercase;
      flex-shrink: 0;
      margin-top: 2px;
      min-width: 18px;
    }
    .clue-body .clue-text {
      font-size: 14px;
      color: var(--floodlight2);
      line-height: 1.6;
    }
    .clue-body .clue-sport {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
      font-weight: 500;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    /* ── GUESS DOTS ── */
    .dots { display: flex; gap: 8px; margin-bottom: 1rem; align-items: center; }
    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--stripe);
      border: 1px solid var(--muted);
    }
    .dot.used { background: var(--muted); border-color: var(--muted); }
    .dot.correct { background: var(--turf-green); border-color: var(--turf-green); }

    /* ── HISTORY PILLS ── */
    .history { display: flex; flex-wrap: wrap; gap: 6px; min-height: 0; margin-bottom: 10px; }
    .pill {
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      padding: 4px 11px;
      border-radius: 3px;
      border: 1px solid;
      letter-spacing: 0.5px;
    }
    .pill.t-yellow { background: var(--yellow-bg); color: var(--yellow); border-color: var(--yellow-border); }
    .pill.t-orange { background: var(--orange-bg); color: var(--orange); border-color: var(--orange-border); }
    .pill.t-red    { background: var(--red-bg);    color: var(--red);    border-color: var(--red-border); }
    .pill.t-brown  { background: var(--brown-bg);  color: var(--brown);  border-color: var(--brown-border); }
    .pill.t-black  { background: var(--black-bg);  color: var(--black-fg); border-color: var(--black-border); }

    /* ── FEEDBACK ── */
    .feedback {
      font-size: 14px;
      font-weight: 500;
      padding: 11px 15px;
      border-radius: var(--radius);
      margin-bottom: 1rem;
      border: 1px solid transparent;
      display: none;
      line-height: 1.5;
      letter-spacing: 0.3px;
    }
    .feedback.show { display: block; }
    .feedback.t-yellow { background: var(--yellow-bg); color: var(--yellow); border-color: var(--yellow-border); }
    .feedback.t-orange { background: var(--orange-bg); color: var(--orange); border-color: var(--orange-border); }
    .feedback.t-red    { background: var(--red-bg);    color: var(--red);    border-color: var(--red-border); }
    .feedback.t-brown  { background: var(--brown-bg);  color: var(--brown);  border-color: var(--brown-border); }
    .feedback.t-black  { background: var(--black-bg);  color: var(--black-fg); border-color: var(--black-border); }

    /* ── LEGEND ── */
    .legend { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 1.25rem; }
    .legend-item {
      font-size: 10px;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: 3px;
      border: 1px solid;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }
    .legend-item.t-yellow { background: var(--yellow-bg); color: var(--yellow); border-color: var(--yellow-border); }
    .legend-item.t-orange { background: var(--orange-bg); color: var(--orange); border-color: var(--orange-border); }
    .legend-item.t-red    { background: var(--red-bg);    color: var(--red);    border-color: var(--red-border); }
    .legend-item.t-brown  { background: var(--brown-bg);  color: var(--brown);  border-color: var(--brown-border); }
    .legend-item.t-black  { background: var(--black-bg);  color: var(--black-fg); border-color: var(--black-border); }

    /* ── GUESS INPUT ── */
    .guess-label {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .guess-row { display: flex; gap: 8px; align-items: center; }
    input[type="number"] {
      font-size: 30px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      width: 150px;
      text-align: center;
      padding: 10px 12px;
      border: 1px solid var(--gold-dim);
      border-radius: var(--radius);
      background: var(--concrete);
      color: var(--gold);
      height: 58px;
      -moz-appearance: textfield;
    }
    input[type="number"]::placeholder { color: #3a4a5a; }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type="number"]:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 2px rgba(240,180,41,0.15);
    }
    input[type="number"]:disabled { opacity: 0.4; }

    .guess-btn {
      height: 58px;
      padding: 0 26px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      background: var(--turf-green);
      color: #050e08;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: opacity 0.12s, transform 0.08s;
    }
    .guess-btn:hover { opacity: 0.88; }
    .guess-btn:active { transform: scale(0.97); }
    .guess-btn:disabled { opacity: 0.3; cursor: default; transform: none; }

    .giveup-btn {
      font-size: 12px;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
      margin-top: 10px;
      display: block;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.3px;
    }
    .giveup-btn:hover { color: var(--floodlight2); }

    /* ── RESULT / REVEAL CARDS ── */
    .result-card, .reveal-card {
      border-radius: var(--radius);
      padding: 1.5rem;
      text-align: center;
      display: none;
      border: 1px solid transparent;
    }
    .result-card.show {
      display: block;
      background: var(--success-bg);
      border-color: var(--success-border);
    }
    .reveal-card.show {
      display: block;
      background: var(--red-bg);
      border-color: var(--red-border);
    }

    .big-year {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 72px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }
    .result-card .big-year { color: var(--turf-green); }
    .reveal-card .big-year { color: var(--red); }

    .result-msg { font-size: 15px; color: var(--floodlight2); }
    .result-attempts { font-size: 12px; color: var(--muted); margin-top: 4px; letter-spacing: 0.5px; text-transform: uppercase; }

    .next-btn {
      margin-top: 16px;
      padding: 10px 24px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      background: transparent;
      border: 1px solid;
      border-radius: var(--radius);
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .result-card .next-btn { color: var(--turf-green); border-color: var(--turf-dim); }
    .reveal-card .next-btn { color: var(--red); border-color: var(--red-border); }
    .next-btn:hover { opacity: 0.7; }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-icon">🏆</div>
    <h1>Sport<span>dle</span></h1>
  </div>

  <div class="scorebar">
    <div class="score-stat"><span id="statPlayed">0</span>played</div>
    <div class="score-stat"><span id="statWon">0</span>won</div>
    <div class="score-stat"><span id="statStreak">0</span>streak</div>
    <div class="score-stat"><span id="statAvg">—</span>avg guesses</div>
  </div>

  <div class="clues" id="clues"></div>

  <div class="legend">
    <span class="legend-item t-yellow">🟡 1–2 yrs</span>
    <span class="legend-item t-orange">🟠 3–10 yrs</span>
    <span class="legend-item t-red">🔴 11–40 yrs</span>
    <span class="legend-item t-brown">🟤 41–200 yrs</span>
    <span class="legend-item t-black">⚫ 200+ yrs</span>
  </div>

  <div class="dots" id="dots"></div>
  <div class="history" id="history"></div>
  <div class="feedback" id="feedback"></div>

  <div id="guessArea">
    <div class="guess-label">What year did all three happen?</div>
    <div class="guess-row">
      <input type="number" id="yearInput" placeholder="1966" min="1850" max="2024" />
      <button class="guess-btn" id="guessBtn" onclick="submitGuess()">Guess</button>
    </div>
    <button class="giveup-btn" onclick="giveUp()">Give up &amp; reveal</button>
  </div>

  <div class="result-card" id="resultCard">
    <div class="big-year" id="resultYear"></div>
    <div class="result-msg" id="resultMsg"></div>
    <div class="result-attempts" id="resultAttempts"></div>
    <button class="next-btn" onclick="nextPuzzle()">Next puzzle →</button>
  </div>

  <div class="reveal-card" id="revealCard">
    <div class="big-year" id="revealYear"></div>
    <div class="result-msg">Better luck next time!</div>
    <button class="next-btn" onclick="nextPuzzle()">Try another →</button>
  </div>
</div>

const MAX_GUESSES = 4;
let currentIdx = 0;
let guesses = [];
let solved = false;
let order = [];
let stats = { played: 0, won: 0, streak: 0, totalGuesses: 0 };

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  // Re-shuffle until no two adjacent puzzles are within 3 years of each other
  for (let attempt = 0; attempt < 200; attempt++) {
    let bad = false;
    for (let i = 0; i < a.length - 1; i++) {
      if (Math.abs(PUZZLES[a[i]].year - PUZZLES[a[i+1]].year) <= 3) {
        // swap a[i+1] with a random later position
        const j = i + 1 + Math.floor(Math.random() * (a.length - i - 1));
        [a[i+1], a[j]] = [a[j], a[i+1]];
        bad = true;
      }
    }
    if (!bad) break;
  }
  return a;
}

function getTier(diff) {
  if (diff <= 2)   return { cls: 't-yellow', emoji: '🟡', label: '1–2 years off' };
  if (diff <= 10)  return { cls: 't-orange', emoji: '🟠', label: '3–10 years off' };
  if (diff <= 40)  return { cls: 't-red',    emoji: '🔴', label: '11–40 years off' };
  if (diff <= 200) return { cls: 't-brown',  emoji: '🟤', label: '41–200 years off' };
  return               { cls: 't-black',  emoji: '⚫', label: '200+ years off' };
}

function init() {
  try {
    const saved = localStorage.getItem('syStats');
    if (saved) stats = JSON.parse(saved);
  } catch(e) {}
  order = shuffle([...Array(PUZZLES.length).keys()]);
  currentIdx = 0;
  loadPuzzle();
  updateStats();
}

function saveStats() {
  try { localStorage.setItem('syStats', JSON.stringify(stats)); } catch(e) {}
}

function updateStats() {
  document.getElementById('statPlayed').textContent = stats.played;
  document.getElementById('statWon').textContent = stats.won;
  document.getElementById('statStreak').textContent = stats.streak;
  document.getElementById('statAvg').textContent = stats.won > 0
    ? (stats.totalGuesses / stats.won).toFixed(1) : '—';
}

function loadPuzzle() {
  guesses = [];
  solved = false;
  const puzzle = PUZZLES[order[currentIdx % order.length]];

  document.getElementById('clues').innerHTML = puzzle.clues.map((c, i) =>
    `<div class="clue-card">
      <span class="clue-num">Clue ${i+1}</span>
      <div class="clue-body">
        <div class="clue-text">${c.text}</div>
        <div class="clue-sport">${c.sport}</div>
      </div>
    </div>`
  ).join('');

  renderDots();
  document.getElementById('history').innerHTML = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('guessArea').style.display = '';
  document.getElementById('resultCard').className = 'result-card';
  document.getElementById('revealCard').className = 'reveal-card';
  const inp = document.getElementById('yearInput');
  inp.value = '';
  inp.min = 1850;
  inp.max = 2024;
  inp.disabled = false;
  document.getElementById('guessBtn').disabled = false;
  inp.focus();
}

function renderDots() {
  document.getElementById('dots').innerHTML = Array.from({length: MAX_GUESSES}, (_, i) =>
    `<div class="dot ${i < guesses.length ? (solved && i === guesses.length - 1 ? 'correct' : 'used') : ''}"></div>`
  ).join('');
}

function submitGuess() {
  const input = document.getElementById('yearInput');
  const val = parseInt(input.value);
  if (!val || val < 1850 || val > 2024) {
    showFeedback('Enter a year between 1850 and 2024.', 't-orange');
    return;
  }
  const puzzle = PUZZLES[order[currentIdx % order.length]];
  const diff = Math.abs(val - puzzle.year);
  guesses.push({ val, diff });

  const pill = document.createElement('span');
  const pillTier = getTier(diff);
  pill.className = 'pill ' + pillTier.cls;
  pill.textContent = val;
  document.getElementById('history').appendChild(pill);

  if (diff === 0) {
    solved = true;
    renderDots();
    stats.played++;
    stats.won++;
    stats.streak++;
    stats.totalGuesses += guesses.length;
    saveStats();
    updateStats();
    showResult(puzzle.year, guesses.length);
    return;
  }

  renderDots();

  if (guesses.length >= MAX_GUESSES) {
    stats.played++;
    stats.streak = 0;
    saveStats();
    updateStats();
    revealAnswer(puzzle.year);
    return;
  }

  const tier = getTier(diff);
  showFeedback(`${tier.emoji} ${tier.label}`, tier.cls);
  input.value = '';
  input.focus();
}

function showFeedback(msg, cls) {
  const el = document.getElementById('feedback');
  el.textContent = msg;
  el.className = 'feedback show ' + cls;
}

function showResult(year, attempts) {
  document.getElementById('guessArea').style.display = 'none';
  document.getElementById('feedback').className = 'feedback';
  const msgs = ['Unbelievable! First try!', 'Incredible sports knowledge!', 'Got there!', 'Just in time!'];
  document.getElementById('resultYear').textContent = year;
  document.getElementById('resultMsg').textContent = msgs[Math.min(attempts - 1, msgs.length - 1)];
  document.getElementById('resultAttempts').textContent = attempts === 1 ? '1 guess' : `${attempts} guesses`;
  document.getElementById('resultCard').className = 'result-card show';
}

function revealAnswer(year) {
  document.getElementById('guessArea').style.display = 'none';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('revealYear').textContent = year;
  document.getElementById('revealCard').className = 'reveal-card show';
}

function giveUp() {
  const puzzle = PUZZLES[order[currentIdx % order.length]];
  stats.played++;
  stats.streak = 0;
  saveStats();
  updateStats();
  revealAnswer(puzzle.year);
}

function nextPuzzle() {
  currentIdx++;
  loadPuzzle();
}

document.getElementById('yearInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitGuess();
});

init();
</script>
