<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sportdle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Stadium palette */
      --night:       #060c14;   /* deep night sky behind the upper deck */
      --stands:      #0b1520;   /* dark blue of empty seats in shadow */
      --turf-edge:   #0d1f0f;   /* deep turf green at the boundary */
      --field:       #132a15;   /* lit field green */
      --concrete:    #111c2a;   /* concourse / card surface */
      --concrete-hi: #172334;   /* slightly lifted surface */
      --stripe:      #0f2540;   /* faint yard-line stripe */
      --floodlight:  #e8f0ff;   /* harsh white floodlight */
      --floodlight2: #b0c4e8;   /* secondary floodlight, slightly cooled */
      --gold:        #f0b429;   /* NFL trophy gold */
      --gold-dim:    #7a5a10;   /* muted gold for borders */
      --turf-green:  #2ecc6a;   /* bright turf accent */
      --turf-dim:    #174d2b;   /* dim turf for borders */
      --red-zone:    #c0392b;   /* end zone red */
      --muted:       #4a6080;   /* muted text */
      --radius: 6px;
      /* distance tier colors — vivid on dark bg */
      --yellow: #f0c040;   --yellow-bg: #2a1f00;  --yellow-border: #7a5a10;
      --orange: #f07030;   --orange-bg: #2a1000;  --orange-border: #7a3010;
      --red:    #e04040;   --red-bg:    #2a0808;  --red-border:    #7a1818;
      --brown:  #c08050;   --brown-bg:  #1e1008;  --brown-border:  #6a4020;
      --black-fg: #8090a0; --black-bg:  #0d1520;  --black-border:  #2a3a4a;
      --success:        #2ecc6a;
      --success-bg:     #0a2018;
      --success-border: #174d2b;
      --success-text:   #2ecc6a;
    }

    body {
      background-color: var(--night);
      background-image:
        radial-gradient(ellipse 120% 40% at 50% 0%, #1a3a6a 0%, transparent 60%),
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 55px,
          rgba(255,255,255,0.015) 55px,
          rgba(255,255,255,0.015) 56px
        );
      color: var(--floodlight);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem 5rem;
    }

    #app { width: 100%; max-width: 580px; }

    /* ── FIELD STRIPE top decoration ── */
    #app::before {
      content: '';
      display: block;
      height: 3px;
      background: repeating-linear-gradient(
        90deg,
        var(--turf-green) 0px, var(--turf-green) 30px,
        transparent 30px, transparent 36px
      );
      margin-bottom: 1.5rem;
      opacity: 0.6;
    }

    /* ── HEADER ── */
    .header { text-align: center; margin-bottom: 1.75rem; }
    .header-icon { font-size: 2.2rem; margin-bottom: 6px; }
    .header h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 42px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--floodlight);
      line-height: 1;
    }
    .header h1 span { color: var(--gold); }
    .header p {
      font-size: 13px;
      color: var(--muted);
      margin-top: 6px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* ── SCOREBAR ── */
    /* ── MODE ROW ── */
    .mode-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .mode-switcher {
      display: flex;
      background: var(--concrete);
      border: 1px solid var(--stripe);
      border-radius: var(--radius);
      padding: 3px;
      gap: 3px;
    }
    .mode-btn {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      background: transparent;
      border: none;
      border-radius: 4px;
      padding: 6px 14px;
      cursor: pointer;
      transition: color 0.15s, background 0.15s;
    }
    .mode-btn.active {
      background: var(--stripe);
      color: var(--gold);
    }
    .mode-btn:not(.active):hover { color: var(--floodlight2); }

    .mode-label {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 1.25rem;
      min-height: 16px;
    }

    /* ── STATS BUTTON ── */
    .stats-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      background: var(--concrete);
      border: 1px solid var(--stripe);
      border-radius: var(--radius);
      padding: 7px 14px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .stats-btn:hover { color: var(--gold); border-color: var(--gold-dim); }

    /* ── MODAL ── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--concrete);
      border: 1px solid var(--stripe);
      border-radius: 10px;
      width: 100%;
      max-width: 400px;
      padding: 1.5rem;
      position: relative;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.25rem;
    }
    .modal-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--gold);
    }
    .modal-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
      padding: 2px 6px;
    }
    .modal-close:hover { color: var(--floodlight); }

    /* ── STATS MODE TABS ── */
    .stats-mode-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 1rem;
    }
    .stats-tab {
      flex: 1;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 7px;
      border-radius: 4px;
      border: 1px solid var(--stripe);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
    }
    .stats-tab.active { background: var(--stripe); color: var(--gold); border-color: var(--gold-dim); }
    .stats-tab:not(.active):hover { color: var(--floodlight2); }

    /* ── DAILY DONE ── */
    .daily-done {
      background: var(--concrete);
      border: 1px solid var(--gold-dim);
      border-radius: 12px;
      padding: 1.5rem;
      text-align: center;
      margin-bottom: 1rem;
    }
    .daily-done-icon { font-size: 2rem; margin-bottom: 8px; }
    .daily-done-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 6px;
    }
    .daily-done-sub { font-size: 14px; color: var(--floodlight2); margin-bottom: 10px; }
    .daily-countdown {
      font-family: 'JetBrains Mono', monospace;
      font-size: 22px;
      font-weight: 700;
      color: var(--floodlight);
      letter-spacing: 2px;
    }
    .modal-scorebar {
      display: flex;
      justify-content: space-between;
      background: var(--concrete-hi);
      border: 1px solid var(--stripe);
      border-radius: var(--radius);
      padding: 10px 16px;
      margin-bottom: 1.5rem;
    }
    .score-stat { text-align: center; }
    .score-stat span {
      display: block;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 1px;
      line-height: 1.1;
    }
    .score-stat { font-size: 11px; color: var(--muted); letter-spacing: 0.8px; text-transform: uppercase; }

    /* ── DISTRIBUTION CHART ── */
    .dist-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .dist-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 7px;
    }
    .dist-key {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--floodlight2);
      width: 24px;
      text-align: right;
      flex-shrink: 0;
    }
    .dist-bar-wrap { flex: 1; background: var(--night); border-radius: 3px; height: 22px; overflow: hidden; }
    .dist-bar {
      height: 100%;
      min-width: 28px;
      background: var(--turf-dim);
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 8px;
      transition: width 0.4s ease;
    }
    .dist-bar.active { background: var(--turf-green); }
    .dist-bar span {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      color: rgba(0,0,0,0.7);
    }
    .dist-bar.inactive span { color: var(--muted); }

    /* ── CLUE CARDS ── */
    .clues { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1.25rem; }
    .clue-card {
      background: var(--concrete);
      border: 1px solid var(--stripe);
      border-left: 3px solid var(--turf-dim);
      border-radius: var(--radius);
      padding: 0.9rem 1.1rem;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .clue-num {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--turf-green);
      letter-spacing: 1px;
      text-transform: uppercase;
      flex-shrink: 0;
      margin-top: 2px;
      min-width: 18px;
    }
    .clue-body .clue-text {
      font-size: 14px;
      color: var(--floodlight2);
      line-height: 1.6;
    }
    .clue-body .clue-sport {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
      font-weight: 500;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    /* ── GUESS DOTS ── */
    .dots { display: flex; gap: 8px; margin-bottom: 1rem; align-items: center; }
    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--stripe);
      border: 1px solid var(--muted);
    }
    .dot.used { background: var(--muted); border-color: var(--muted); }
    .dot.correct { background: var(--turf-green); border-color: var(--turf-green); }

    /* ── HISTORY PILLS ── */
    .history { display: flex; flex-wrap: wrap; gap: 6px; min-height: 0; margin-bottom: 10px; }
    .pill {
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      padding: 4px 11px;
      border-radius: 3px;
      border: 1px solid;
      letter-spacing: 0.5px;
    }
    .pill.t-yellow { background: var(--yellow-bg); color: var(--yellow); border-color: var(--yellow-border); }
    .pill.t-orange { background: var(--orange-bg); color: var(--orange); border-color: var(--orange-border); }
    .pill.t-red    { background: var(--red-bg);    color: var(--red);    border-color: var(--red-border); }
    .pill.t-brown  { background: var(--brown-bg);  color: var(--brown);  border-color: var(--brown-border); }
    .pill.t-black  { background: var(--black-bg);  color: var(--black-fg); border-color: var(--black-border); }

    /* ── FEEDBACK ── */
    .feedback {
      font-size: 14px;
      font-weight: 500;
      padding: 11px 15px;
      border-radius: var(--radius);
      margin-bottom: 1rem;
      border: 1px solid transparent;
      display: none;
      line-height: 1.5;
      letter-spacing: 0.3px;
    }
    .feedback.show { display: block; }
    .feedback.t-yellow { background: var(--yellow-bg); color: var(--yellow); border-color: var(--yellow-border); }
    .feedback.t-orange { background: var(--orange-bg); color: var(--orange); border-color: var(--orange-border); }
    .feedback.t-red    { background: var(--red-bg);    color: var(--red);    border-color: var(--red-border); }
    .feedback.t-brown  { background: var(--brown-bg);  color: var(--brown);  border-color: var(--brown-border); }
    .feedback.t-black  { background: var(--black-bg);  color: var(--black-fg); border-color: var(--black-border); }

    /* ── LEGEND ── */
    .legend { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 1.25rem; }
    .legend-item {
      font-size: 10px;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: 3px;
      border: 1px solid;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }
    .legend-item.t-yellow { background: var(--yellow-bg); color: var(--yellow); border-color: var(--yellow-border); }
    .legend-item.t-orange { background: var(--orange-bg); color: var(--orange); border-color: var(--orange-border); }
    .legend-item.t-red    { background: var(--red-bg);    color: var(--red);    border-color: var(--red-border); }
    .legend-item.t-brown  { background: var(--brown-bg);  color: var(--brown);  border-color: var(--brown-border); }
    .legend-item.t-black  { background: var(--black-bg);  color: var(--black-fg); border-color: var(--black-border); }

    /* ── GUESS INPUT ── */
    .guess-label {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .guess-row { display: flex; gap: 8px; align-items: center; }
    input[type="number"] {
      font-size: 30px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      width: 150px;
      text-align: center;
      padding: 10px 12px;
      border: 1px solid var(--gold-dim);
      border-radius: var(--radius);
      background: var(--concrete);
      color: var(--gold);
      height: 58px;
      -moz-appearance: textfield;
    }
    input[type="number"]::placeholder { color: #3a4a5a; }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type="number"]:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 2px rgba(240,180,41,0.15);
    }
    input[type="number"]:disabled { opacity: 0.4; }

    .guess-btn {
      height: 58px;
      padding: 0 26px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      background: var(--turf-green);
      color: #050e08;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: opacity 0.12s, transform 0.08s;
    }
    .guess-btn:hover { opacity: 0.88; }
    .guess-btn:active { transform: scale(0.97); }
    .guess-btn:disabled { opacity: 0.3; cursor: default; transform: none; }

    .giveup-btn {
      font-size: 12px;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
      margin-top: 10px;
      display: block;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.3px;
    }
    .giveup-btn:hover { color: var(--floodlight2); }

    /* ── RESULT / REVEAL CARDS ── */
    .result-card, .reveal-card {
      border-radius: var(--radius);
      padding: 1.5rem;
      text-align: center;
      display: none;
      border: 1px solid transparent;
    }
    .result-card.show {
      display: block;
      background: var(--success-bg);
      border-color: var(--success-border);
    }
    .reveal-card.show {
      display: block;
      background: var(--red-bg);
      border-color: var(--red-border);
    }

    .big-year {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 72px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }
    .result-card .big-year { color: var(--turf-green); }
    .reveal-card .big-year { color: var(--red); }

    .result-msg { font-size: 15px; color: var(--floodlight2); }
    .result-attempts { font-size: 12px; color: var(--muted); margin-top: 4px; letter-spacing: 0.5px; text-transform: uppercase; }

    .next-btn {
      margin-top: 16px;
      padding: 10px 24px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      background: transparent;
      border: 1px solid;
      border-radius: var(--radius);
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .result-card .next-btn { color: var(--turf-green); border-color: var(--turf-dim); }
    .reveal-card .next-btn { color: var(--red); border-color: var(--red-border); }
    .next-btn:hover { opacity: 0.7; }

    .result-actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .share-btn {
      padding: 10px 24px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      background: var(--gold);
      color: #1a1200;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      width: 100%;
      transition: opacity 0.15s;
    }
    .share-btn:hover { opacity: 0.85; }
    .share-btn.copied { background: var(--turf-green); color: #050e08; }

    /* ── DIFFICULTY ── */
    .difficulty {
      display: flex;
      gap: 2px;
      margin-top: 6px;
      align-items: center;
    }
    .diff-pip {
      width: 7px; height: 7px;
      border-radius: 1px;
      background: var(--stripe);
    }
    .diff-pip.on { background: var(--gold); }
    .diff-1 .diff-pip.on { background: #4ade80; }
    .diff-2 .diff-pip.on { background: #86efac; }
    .diff-3 .diff-pip.on { background: var(--gold); }
    .diff-4 .diff-pip.on { background: #fb923c; }
    .diff-5 .diff-pip.on { background: #f87171; }
    .diff-label { font-size: 10px; color: var(--muted); margin-left: 5px; letter-spacing: 0.5px; text-transform: uppercase; }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-icon">🏆</div>
    <h1>Sport<span>dle</span></h1>
  </div>

  <div class="mode-row">
    <div class="mode-switcher">
      <button class="mode-btn active" id="btnDaily" onclick="switchMode('daily')">📅 Daily</button>
      <button class="mode-btn" id="btnUnlimited" onclick="switchMode('unlimited')">∞ Unlimited</button>
    </div>
    <button class="stats-btn" onclick="openStats()" title="View stats">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Stats
    </button>
  </div>

  <div class="mode-label" id="modeLabel"></div>

  <!-- Stats Modal -->
  <div class="modal-backdrop" id="modalBackdrop" onclick="closeStats()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <span class="modal-title" id="statsModalTitle">Daily Stats</span>
        <button class="modal-close" onclick="closeStats()">✕</button>
      </div>
      <div class="stats-mode-tabs">
        <button class="stats-tab active" id="tabDaily" onclick="switchStatsTab('daily')">📅 Daily</button>
        <button class="stats-tab" id="tabUnlimited" onclick="switchStatsTab('unlimited')">∞ Unlimited</button>
      </div>
      <div class="modal-scorebar">
        <div class="score-stat"><span id="statPlayed">0</span>played</div>
        <div class="score-stat"><span id="statWon">0</span>won</div>
        <div class="score-stat"><span id="statStreak">0</span>streak</div>
        <div class="score-stat"><span id="statAvg">—</span>avg guesses</div>
      </div>
      <div class="dist-label">Guess Distribution</div>
      <div class="dist-chart" id="distChart"></div>
    </div>
  </div>

  <!-- Daily done overlay -->
  <div class="daily-done" id="dailyDone" style="display:none">
    <div class="daily-done-icon">🎉</div>
    <div class="daily-done-title">You've completed today's puzzle!</div>
    <div class="daily-done-sub" id="dailyDoneSub"></div>
    <div class="daily-countdown" id="dailyCountdown"></div>
    <div class="result-actions" style="margin-top:14px">
      <button class="share-btn" onclick="shareResult()">📋 Copy Result</button>
      <button class="next-btn" style="color:var(--gold);border-color:var(--gold-dim)" onclick="switchMode('unlimited')">Play Unlimited →</button>
    </div>
  </div>

  <div class="clues" id="clues"></div>

  <div class="legend">

const MAX_GUESSES = 4;
let currentIdx = 0;
let guesses = [];
let solved = false;
let order = [];
let mode = 'daily'; // 'daily' | 'unlimited'
let statsTab = 'daily';

// Separate stats for daily and unlimited
let allStats = {
  daily:     { played: 0, won: 0, streak: 0, totalGuesses: 0, dist: [0,0,0,0,0] },
  unlimited: { played: 0, won: 0, streak: 0, totalGuesses: 0, dist: [0,0,0,0,0] }
};
let stats = allStats.daily; // pointer to current mode stats

// ── DAILY PUZZLE ──
// Uses a seeded shuffle per "cycle" so order varies each time through all puzzles
function seededShuffle(arr, seed) {
  const a = [...arr];
  let s = seed;
  for (let i = a.length - 1; i > 0; i--) {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    const j = Math.abs(s) % (i + 1);
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getDailyPuzzleIdx() {
  const epoch = new Date('2026-06-29').getTime();
  const today = new Date();
  const todayUTC = Date.UTC(today.getFullYear(), today.getMonth(), today.getDate());
  const dayNum = Math.floor((todayUTC - epoch) / 86400000);
  const cycle = Math.floor(dayNum / PUZZLES.length);
  const posInCycle = dayNum % PUZZLES.length;
  // Each cycle gets a different shuffle using cycle number as seed
  const shuffled = seededShuffle([...Array(PUZZLES.length).keys()], cycle * 999983 + 42);
  return shuffled[posInCycle];
}

// Keep getDailyIndex as alias
function getDailyIndex() { return getDailyPuzzleIdx(); }

function getTodayKey() {
  const t = new Date();
  return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
}

function getDailyState() {
  try {
    const s = localStorage.getItem('syDaily');
    return s ? JSON.parse(s) : null;
  } catch(e) { return null; }
}

function saveDailyState(state) {
  try { localStorage.setItem('syDaily', JSON.stringify(state)); } catch(e) {}
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  for (let attempt = 0; attempt < 200; attempt++) {
    let bad = false;
    for (let i = 0; i < a.length - 1; i++) {
      if (Math.abs(PUZZLES[a[i]].year - PUZZLES[a[i+1]].year) <= 3) {
        const j = i + 1 + Math.floor(Math.random() * (a.length - i - 1));
        [a[i+1], a[j]] = [a[j], a[i+1]];
        bad = true;
      }
    }
    if (!bad) break;
  }
  return a;
}

function getTier(diff) {
  if (diff <= 2)   return { cls: 't-yellow', emoji: '🟡', label: '1–2 years off' };
  if (diff <= 10)  return { cls: 't-orange', emoji: '🟠', label: '3–10 years off' };
  if (diff <= 40)  return { cls: 't-red',    emoji: '🔴', label: '11–40 years off' };
  if (diff <= 200) return { cls: 't-brown',  emoji: '🟤', label: '41–200 years off' };
  return               { cls: 't-black',  emoji: '⚫', label: '200+ years off' };
}

function init() {
  try {
    const saved = localStorage.getItem('syStatsV2');
    if (saved) {
      const parsed = JSON.parse(saved);
      allStats = { ...allStats, ...parsed };
      ['daily','unlimited'].forEach(m => {
        if (!Array.isArray(allStats[m].dist) || allStats[m].dist.length !== 5)
          allStats[m].dist = [0,0,0,0,0];
      });
    }
  } catch(e) {}

  order = shuffle([...Array(PUZZLES.length).keys()]);
  currentIdx = 0;
  switchMode('daily');
}

function saveStats() {
  try { localStorage.setItem('syStatsV2', JSON.stringify(allStats)); } catch(e) {}
}

function switchMode(newMode) {
  mode = newMode;
  stats = allStats[mode];

  document.getElementById('btnDaily').classList.toggle('active', mode === 'daily');
  document.getElementById('btnUnlimited').classList.toggle('active', mode === 'unlimited');

  if (mode === 'daily') {
    loadDailyPuzzle();
  } else {
    document.getElementById('dailyDone').style.display = 'none';
    document.getElementById('modeLabel').textContent = 'Unlimited — play as many as you like';
    loadUnlimitedPuzzle();
  }
  updateStats();
}

function loadDailyPuzzle() {
  const todayKey = getTodayKey();
  const dailyIdx = getDailyIndex();
  const puzzle = PUZZLES[dailyIdx];
  const saved = getDailyState();

  document.getElementById('modeLabel').textContent = `Daily Puzzle · ${todayKey}`;

  // Already played today
  if (saved && saved.date === todayKey) {
    showDailyDone(saved, puzzle);
    return;
  }

  // Fresh daily
  guesses = [];
  solved = false;
  renderPuzzle(puzzle);
  renderDots();
  document.getElementById('history').innerHTML = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('guessArea').style.display = '';
  document.getElementById('resultCard').className = 'result-card';
  document.getElementById('revealCard').className = 'reveal-card';
  document.getElementById('dailyDone').style.display = 'none';
  const inp = document.getElementById('yearInput');
  inp.value = ''; inp.disabled = false;
  document.getElementById('guessBtn').disabled = false;
  inp.focus();
  updateNextBtnLabels();
}

function loadUnlimitedPuzzle() {
  guesses = [];
  solved = false;
  const puzzle = PUZZLES[order[currentIdx % order.length]];
  renderPuzzle(puzzle);
  renderDots();
  document.getElementById('history').innerHTML = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('guessArea').style.display = '';
  document.getElementById('resultCard').className = 'result-card';
  document.getElementById('revealCard').className = 'reveal-card';
  document.getElementById('dailyDone').style.display = 'none';
  const inp = document.getElementById('yearInput');
  inp.value = ''; inp.disabled = false;
  document.getElementById('guessBtn').disabled = false;
  inp.focus();
  updateNextBtnLabels();
}

function renderPuzzle(puzzle) {
  const diffLabels = ['','Very Easy','Easy','Medium','Hard','Very Hard'];
  const pips = d => Array.from({length:5},(_,i)=>`<div class="diff-pip${i<d?' on':''}"></div>`).join('');
  document.getElementById('clues').innerHTML = puzzle.clues.map((c, i) =>
    `<div class="clue-card">
      <span class="clue-num">Clue ${i+1}</span>
      <div class="clue-body">
        <div class="clue-text">${c.text}</div>
        <div class="clue-sport">${c.sport}</div>
        <div class="difficulty diff-${c.difficulty}">${pips(c.difficulty)}<span class="diff-label">${diffLabels[c.difficulty]}</span></div>
      </div>
    </div>`
  ).join('');
}

function updateNextBtnLabels() {
  if (mode === 'daily') {
    document.getElementById('resultNextBtn').textContent = 'Play Unlimited →';
    document.getElementById('revealNextBtn').textContent = 'Play Unlimited →';
  } else {
    document.getElementById('resultNextBtn').textContent = 'Next puzzle →';
    document.getElementById('revealNextBtn').textContent = 'Try another →';
  }
}

function onNextBtn() {
  if (mode === 'daily') {
    switchMode('unlimited');
  } else {
    currentIdx++;
    loadUnlimitedPuzzle();
  }
}

function showDailyDone(saved, puzzle) {
  document.getElementById('clues').innerHTML = '';
  document.getElementById('guessArea').style.display = 'none';
  document.getElementById('resultCard').className = 'result-card';
  document.getElementById('revealCard').className = 'reveal-card';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('history').innerHTML = '';
  document.getElementById('dots').innerHTML = '';

  const doneEl = document.getElementById('dailyDone');
  doneEl.style.display = 'block';

  const answerYear = saved.year || puzzle.year;
  if (saved.won) {
    document.getElementById('dailyDoneSub').textContent =
      `You got it in ${saved.guesses} guess${saved.guesses === 1 ? '' : 'es'}! The answer was ${answerYear}.`;
  } else {
    document.getElementById('dailyDoneSub').textContent =
      `The answer was ${answerYear}. Come back tomorrow for a new puzzle!`;
  }

  updateCountdown();
  if (!window._countdownInterval) {
    window._countdownInterval = setInterval(updateCountdown, 1000);
  }
}

function updateCountdown() {
  const now = new Date();
  const tomorrow = new Date(now);
  tomorrow.setDate(tomorrow.getDate() + 1);
  tomorrow.setHours(0,0,0,0);
  const diff = tomorrow - now;
  const h = String(Math.floor(diff / 3600000)).padStart(2,'0');
  const m = String(Math.floor((diff % 3600000) / 60000)).padStart(2,'0');
  const s = String(Math.floor((diff % 60000) / 1000)).padStart(2,'0');
  const el = document.getElementById('dailyCountdown');
  if (el) el.textContent = `Next puzzle in ${h}:${m}:${s}`;
}

function renderDots() {
  document.getElementById('dots').innerHTML = Array.from({length: MAX_GUESSES}, (_, i) =>
    `<div class="dot ${i < guesses.length ? (solved && i === guesses.length - 1 ? 'correct' : 'used') : ''}"></div>`
  ).join('');
}

function getCurrentPuzzle() {
  if (mode === 'daily') return PUZZLES[getDailyIndex()];
  return PUZZLES[order[currentIdx % order.length]];
}

function submitGuess() {
  const input = document.getElementById('yearInput');
  const val = parseInt(input.value);
  if (!val || val < 1850 || val > 2024) {
    showFeedback('Enter a year between 1850 and 2024.', 't-orange');
    return;
  }
  const puzzle = getCurrentPuzzle();
  const diff = Math.abs(val - puzzle.year);
  guesses.push({ val, diff });

  const pill = document.createElement('span');
  const pillTier = getTier(diff);
  pill.className = 'pill ' + pillTier.cls;
  pill.textContent = val;
  document.getElementById('history').appendChild(pill);

  if (diff === 0) {
    solved = true;
    renderDots();
    stats.played++;
    stats.won++;
    stats.streak++;
    stats.totalGuesses += guesses.length;
    stats.dist[guesses.length - 1]++;
    saveStats();
    updateStats();
    if (mode === 'daily') {
      saveDailyState({ date: getTodayKey(), won: true, guesses: guesses.length, diffs: guesses.map(g => g.diff), guessVals: guesses.map(g => g.val), year: puzzle.year });
    }
    showResult(puzzle.year, guesses.length);
    return;
  }

  renderDots();

  if (guesses.length >= MAX_GUESSES) {
    stats.played++;
    stats.streak = 0;
    stats.dist[4]++;
    saveStats();
    updateStats();
    if (mode === 'daily') {
      saveDailyState({ date: getTodayKey(), won: false, guesses: MAX_GUESSES, diffs: guesses.map(g => g.diff), guessVals: guesses.map(g => g.val), year: puzzle.year });
    }
    revealAnswer(puzzle.year);
    return;
  }

  const tier = getTier(diff);
  showFeedback(`${tier.emoji} ${tier.label}`, tier.cls);
  input.value = '';
  input.focus();
}

function showFeedback(msg, cls) {
  const el = document.getElementById('feedback');
  el.textContent = msg;
  el.className = 'feedback show ' + cls;
}

function getTierEmoji(diff) {
  if (diff === 0)  return '🟩';
  if (diff <= 2)   return '🟨';
  if (diff <= 10)  return '🟧';
  if (diff <= 40)  return '🟥';
  if (diff <= 200) return '🟫';
  return '⬛';
}

function getDirectionEmoji(val, answer) {
  if (val === answer) return '🎯';
  return val < answer ? '🔼' : '🔽';
}

function generateShareText() {
  const saved = getDailyState();
  if (!saved || !saved.diffs) return null;
  const dayNum = Math.floor((Date.UTC(new Date().getFullYear(), new Date().getMonth(), new Date().getDate()) - new Date('2026-06-29').getTime()) / 86400000) + 1;
  const puzzle = PUZZLES[getDailyIndex()];

  // Reconstruct guess values from diffs — we need to store them
  // Use saved.guessVals if available, otherwise use diffs only (no direction)
  const diffs = saved.diffs;
  const vals = saved.guessVals || [];
  const usedGuesses = diffs.length;

  // Row 1: tier color squares + stars for unused guesses
  const row1 = diffs.map(d => getTierEmoji(d)).join('') +
    '🌟'.repeat(MAX_GUESSES - usedGuesses);

  // Row 2: direction arrows + stars (need actual values)
  let row2 = '';
  if (vals.length === usedGuesses) {
    row2 = vals.map((v, i) => getDirectionEmoji(v, puzzle.year)).join('') +
      '🌟'.repeat(MAX_GUESSES - usedGuesses);
  }

  const result = saved.won ? `${usedGuesses}/${MAX_GUESSES}` : 'X/4';
  let text = `#Sportdle #${dayNum} ${result}\n${row1}`;
  if (row2) text += `\n${row2}`;
  return text;
}

function shareResult() {
  const text = generateShareText();
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    const btns = document.querySelectorAll('.share-btn');
    btns.forEach(b => { b.textContent = '✓ Copied!'; b.classList.add('copied'); });
    setTimeout(() => {
      btns.forEach(b => { b.textContent = '📋 Copy Result'; b.classList.remove('copied'); });
    }, 2000);
  }).catch(() => {
    // Fallback for older browsers
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    const btns = document.querySelectorAll('.share-btn');
    btns.forEach(b => { b.textContent = '✓ Copied!'; b.classList.add('copied'); });
    setTimeout(() => {
      btns.forEach(b => { b.textContent = '📋 Copy Result'; b.classList.remove('copied'); });
    }, 2000);
  });
}

function showResult(year, attempts) {
  document.getElementById('guessArea').style.display = 'none';
  document.getElementById('feedback').className = 'feedback';
  const msgs = ['Unbelievable! First try!', 'Incredible sports knowledge!', 'Got there!', 'Just in time!'];
  document.getElementById('resultYear').textContent = year;
  document.getElementById('resultMsg').textContent = msgs[Math.min(attempts - 1, msgs.length - 1)];
  document.getElementById('resultAttempts').textContent = attempts === 1 ? '1 guess' : `${attempts} guesses`;
  document.getElementById('resultCard').className = 'result-card show';
  const showShare = mode === 'daily';
  document.getElementById('shareBtn').style.display = showShare ? 'block' : 'none';
  updateNextBtnLabels();
}

function revealAnswer(year) {
  document.getElementById('guessArea').style.display = 'none';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('revealYear').textContent = year;
  document.getElementById('revealCard').className = 'reveal-card show';
  const showShare = mode === 'daily';
  document.getElementById('shareBtn2').style.display = showShare ? 'block' : 'none';
  updateNextBtnLabels();
}

function giveUp() {
  const puzzle = getCurrentPuzzle();
  stats.played++;
  stats.streak = 0;
  stats.dist[4]++;
  saveStats();
  updateStats();
  if (mode === 'daily') {
    saveDailyState({ date: getTodayKey(), won: false, guesses: MAX_GUESSES, diffs: guesses.map(g => g.diff), guessVals: guesses.map(g => g.val), year: puzzle.year });
  }
  revealAnswer(puzzle.year);
}

function nextPuzzle() {
  currentIdx++;
  loadUnlimitedPuzzle();
}

// ── STATS ──
function updateStats() {
  const s = allStats[statsTab] || allStats.daily;
  document.getElementById('statPlayed').textContent = s.played;
  document.getElementById('statWon').textContent = s.won;
  document.getElementById('statStreak').textContent = s.streak;
  document.getElementById('statAvg').textContent = s.won > 0
    ? (s.totalGuesses / s.won).toFixed(1) : '—';
}

function openStats() {
  statsTab = mode;
  document.getElementById('tabDaily').classList.toggle('active', statsTab === 'daily');
  document.getElementById('tabUnlimited').classList.toggle('active', statsTab === 'unlimited');
  document.getElementById('statsModalTitle').textContent = statsTab === 'daily' ? 'Daily Stats' : 'Unlimited Stats';
  updateStats();
  renderDist();
  document.getElementById('modalBackdrop').classList.add('open');
}

function closeStats() {
  document.getElementById('modalBackdrop').classList.remove('open');
}

function switchStatsTab(tab) {
  statsTab = tab;
  document.getElementById('tabDaily').classList.toggle('active', tab === 'daily');
  document.getElementById('tabUnlimited').classList.toggle('active', tab === 'unlimited');
  document.getElementById('statsModalTitle').textContent = tab === 'daily' ? 'Daily Stats' : 'Unlimited Stats';
  updateStats();
  renderDist();
}

function renderDist() {
  const labels = ['1 guess', '2 guesses', '3 guesses', '4 guesses', 'Miss'];
  const dist = (allStats[statsTab] || allStats.daily).dist;
  const max = Math.max(...dist, 1);
  const chart = document.getElementById('distChart');
  chart.innerHTML = labels.map((label, i) => {
    const count = dist[i] || 0;
    const pct = Math.max(8, Math.round((count / max) * 100));
    const isMiss = i === 4;
    return `<div class="dist-row">
      <div class="dist-key">${isMiss ? '✕' : (i + 1)}</div>
      <div class="dist-bar-wrap">
        <div class="dist-bar ${count > 0 && !isMiss ? 'active' : 'inactive'}" style="width:${pct}%">
          <span>${count}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeStats(); });

document.getElementById('yearInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitGuess();
});

init();
</script>
</body>
</html>
